name: Question or setup help
description: Ask about installation, evidence access, verdicts, or supported index shapes.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying IndexPilot. Please redact credentials, raw production SQL, schema names,
        and customer data. You can also use
        [Q&A Discussions](https://github.com/eyeinthesky6/indexpilot/discussions/categories/q-a)
        for setup and usage help. If the tool helped or failed at a real decision, you may instead
        share an optional sanitized first-value receipt in
        [Show and tell](https://github.com/eyeinthesky6/indexpilot/discussions/categories/show-and-tell).
        IndexPilot collects no silent CLI telemetry. For vulnerabilities, use the private
        security-report link instead.
  - type: dropdown
    id: area
    attributes:
      label: What do you need help with?
      options:
        - Installation or packaging
        - Database permissions or doctor checks
        - Migration review
        - Verdict or report interpretation
        - GitHub Actions or SARIF
        - Supported syntax or roadmap
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: IndexPilot version
      description: Run `indexpilot --version` when available. Use `not installed` if setup failed first.
      placeholder: 1.1.0a1 or not installed
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Include the sanitized command, expected outcome, and relevant error or verdict.
    validations:
      required: true
  - type: textarea
    id: first_value_receipt
    attributes:
      label: Optional first-value receipt
      description: What decision did IndexPilot clarify, or what exact failure prevented the first useful report? Do not include raw SQL, credentials, private object names, or customer data.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private SQL, schema details, and customer data.
          required: true
