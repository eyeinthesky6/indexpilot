name: Bug report
description: Report a reproducible IndexPilot problem without sharing private SQL or credentials.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping. Redact credentials, raw production SQL, and customer data.
  - type: dropdown
    id: area
    attributes:
      label: Where did the problem occur?
      options:
        - Installation or packaging
        - CLI command or report
        - Database connection or permissions
        - Migration parsing or verdict
        - Dashboard
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: IndexPilot version
      description: Use `not installed` or `not applicable` when the command cannot run.
      placeholder: Paste `indexpilot --version`, or write not installed / not applicable
  - type: input
    id: postgres
    attributes:
      label: PostgreSQL version
      description: Optional for packaging, documentation, and dashboard-only problems.
      placeholder: PostgreSQL 15, unknown, or not applicable
  - type: textarea
    id: command
    attributes:
      label: Steps to reproduce
      description: Include a redacted command and inputs when they are relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private SQL, and customer data.
          required: true
