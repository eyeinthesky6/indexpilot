name: Bug report
description: Report a reproducible IndexPilot problem without sharing private SQL or credentials.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping. Redact credentials, raw production SQL, and customer data.
  - type: input
    id: version
    attributes:
      label: IndexPilot version
      placeholder: indexpilot --version
    validations:
      required: true
  - type: input
    id: postgres
    attributes:
      label: PostgreSQL version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Redacted command and inputs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private SQL, and customer data.
          required: true
