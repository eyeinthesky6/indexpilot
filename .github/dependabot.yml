version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    versioning-strategy: increase-if-necessary
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    groups:
      ui-dependencies:
        patterns:
          - "*"
    ignore:
      # Match the supported Node 22 runtime until the runtime itself is upgraded.
      - dependency-name: "@types/node"
        versions: [">=23"]
      # The active Next.js ESLint plugin tree does not yet accept ESLint 10.
      - dependency-name: "eslint"
        versions: [">=10"]
      # openapi-typescript and typescript-eslint currently exclude TypeScript 6+.
      - dependency-name: "typescript"
        versions: [">=6"]
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
