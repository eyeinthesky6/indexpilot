version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    versioning-strategy: increase-if-necessary
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    groups:
      ui-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
