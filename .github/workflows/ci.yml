name: CI

on:
  push:
  pull_request:

jobs:
  package:
    name: package (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: python -m pip check
      - run: indexpilot --help
      - run: indexpilot review --help
      - name: Smoke-test the core review runtime without optional ML extras
        run: >-
          python -c "from src.auto_indexer import review_planner_recommendations;
          from src.workload_dna import build_index_review_report;
          assert callable(review_planner_recommendations);
          assert callable(build_index_review_report)"

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: indexpilot
          POSTGRES_PASSWORD: indexpilot
          POSTGRES_DB: indexpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U indexpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: indexpilot
      DB_USER: indexpilot
      DB_PASSWORD: indexpilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev,api,ml]"
      - run: python -m pytest tests -q
      - run: python scripts/check_unsafe_db_access.py

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
