name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent-routing:
    name: agent-routing/contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - name: Check the exact reviewed diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"
      - name: Route the exact reviewed diff to agent guidance and checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python scripts/agent_skill_router.py --git-range "$BASE_SHA...$HEAD_SHA" --dry-run
      - name: Prove agent routing and public skill contracts
        run: python -m pytest tests/test_agent_skill_router.py tests/test_public_onboarding.py -q

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install checksum-verified Gitleaks CLI
        shell: bash
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          curl --proto '=https' --tlsv1.2 -fsSLo "$RUNNER_TEMP/$archive" "$url"
          echo "$GITLEAKS_LINUX_X64_SHA256  $RUNNER_TEMP/$archive" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan every branch and tag for secrets
        shell: bash
        run: |
          "$RUNNER_TEMP/gitleaks" git . --no-banner --redact --log-opts=--all

  package:
    name: package (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: python -m pip check
      - run: indexpilot --help
      - run: indexpilot review --help
      - run: indexpilot snapshot --help
      - run: indexpilot doctor --help
      - run: indexpilot audit --help
      - run: indexpilot compare --help
      - run: indexpilot dashboard --help
      - name: Smoke-test the core review runtime without optional ML extras
        run: >-
          python -c "from src.auto_indexer import review_planner_recommendations;
          from src.workload_dna import build_index_review_report,
          build_migration_review_report, build_sanitized_workload_snapshot,
          build_workload_readiness_report,
          build_index_sprawl_report, compare_index_review_reports;
          assert callable(review_planner_recommendations);
          assert callable(build_index_review_report);
          assert callable(build_migration_review_report);
          assert callable(build_sanitized_workload_snapshot);
          assert callable(build_workload_readiness_report);
          assert callable(build_index_sprawl_report);
          assert callable(compare_index_review_reports)"

  fork-safe-offline:
    name: fork-safe offline review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - name: Prove sanitized review needs no PostgreSQL service or secrets
        run: >-
          python -m pytest tests/test_workload_dna.py tests/test_cli.py -q
          -k "sanitized_snapshot or offline_snapshot or snapshot_file"

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: indexpilot
          POSTGRES_PASSWORD: indexpilot
          POSTGRES_DB: indexpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U indexpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: indexpilot
      DB_USER: indexpilot
      DB_PASSWORD: indexpilot
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev,api,ml]"
      - run: python -m pytest tests -q
      - run: python scripts/check_unsafe_db_access.py

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.31.0
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: python ../scripts/build_dashboard_assets.py
      - name: Verify the committed dashboard matches the bundled build
        run: git diff --exit-code -- ../indexpilot/dashboard_static
