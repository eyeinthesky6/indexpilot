name: Publish Python package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Verify linked public release surfaces before build
        env:
          INDEXPILOT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python scripts/check_release_surface_sync.py
      - run: python -m pip install --upgrade build
      - run: test -f indexpilot/dashboard_static/dashboard/index.html
      - run: python -m build
      - name: Inspect and smoke-test the exact wheel
        shell: bash
        run: |
          wheel=$(echo dist/*.whl)
          python - <<'PY'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")[0]
          with zipfile.ZipFile(wheel) as archive:
              names = set(archive.namelist())
          assert "indexpilot/dashboard_static/dashboard/index.html" in names
          assert any(name.startswith("indexpilot/dashboard_static/_next/static/") for name in names)
          PY
          python -m pip install "${wheel}[api]"
          indexpilot --version
          indexpilot dashboard --help
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/indexpilot/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
