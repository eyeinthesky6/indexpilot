# Compact machine-readable routing map. Human and coding-agent instructions live in AGENTS.md.
project:
  name: IndexPilot
  status: alpha
  purpose: "Stop bad PostgreSQL indexes before they reach production"
  promise: "Decide whether an exact proposed index has enough evidence to deserve a benchmark"
  non_goals:
    - apply migrations
    - create or drop physical indexes
    - run EXPLAIN ANALYZE
    - claim planner cost equals production latency
    - provide automatic safe-to-drop advice

public_entrypoints:
  cli: indexpilot/cli.py
  commands:
    - indexpilot doctor
    - indexpilot review
    - indexpilot audit
    - indexpilot compare

canonical_owners:
  review_reports: src/workload_dna.py
  workload_planning: src/auto_indexer.py
  sql_parsing: src/sql_parser.py
  database_access: src/db.py
  documentation:
    - README.md
    - docs/USAGE.md
    - docs/INSTALLATION.md
    - docs/ROADMAP.md

validation:
  backend:
    - python -m pytest tests -q
    - python scripts/check_unsafe_db_access.py
    - python -m build
  dashboard:
    - cd ui && pnpm install --frozen-lockfile
    - cd ui && pnpm lint
    - cd ui && pnpm build

safety:
  - preserve the read-only public path
  - report fingerprints instead of raw workload SQL
  - keep verdicts advisory
  - verify current callers before exposing historical modules
  - never add regex SQL parsing fallbacks
