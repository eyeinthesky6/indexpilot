<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="760" viewBox="0 0 1270 760" role="img" aria-labelledby="title desc">
  <title id="title">A pull request review from IndexPilot</title>
  <desc id="desc">A proposed PostgreSQL index is compared with a sanitized workload snapshot and receives an existing overlap verdict without creating the index.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06162d"/>
      <stop offset="1" stop-color="#0c2440"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020916" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1270" height="760" fill="url(#bg)"/>
  <path d="M0 122H1270M0 638H1270" stroke="#1a3554"/>
  <g opacity="0.18" stroke="#244566">
    <path d="M48 0V760M104 0V760M160 0V760M1110 0V760M1166 0V760M1222 0V760"/>
    <path d="M0 48H1270M0 704H1270"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="64" y="71" fill="#f8f4e9" font-size="38" font-weight="760">A review you can use in a pull request</text>
    <text x="64" y="103" fill="#9fb1c6" font-size="18">The exact migration, checked against workload evidence before merge.</text>

    <g transform="translate(66 154)" filter="url(#shadow)">
      <rect width="493" height="430" rx="22" fill="#0c1b31" stroke="#29435f" stroke-width="2"/>
      <circle cx="30" cy="31" r="7" fill="#ff6b68"/>
      <circle cx="53" cy="31" r="7" fill="#ffc44d"/>
      <circle cx="76" cy="31" r="7" fill="#b9f33a"/>
      <text x="106" y="38" fill="#91a4bb" font-size="15" font-family="Consolas, monospace">migration.sql</text>
      <path d="M0 61H493" stroke="#263d57"/>

      <text x="28" y="108" fill="#6d829b" font-size="17" font-family="Consolas, monospace">-- proposed by a developer or coding agent</text>
      <text x="28" y="154" fill="#b9f33a" font-size="20" font-family="Consolas, monospace">CREATE INDEX CONCURRENTLY</text>
      <text x="28" y="188" fill="#f8f4e9" font-size="20" font-family="Consolas, monospace">idx_orders_tenant_created_v2</text>
      <text x="28" y="222" fill="#9fd8ff" font-size="20" font-family="Consolas, monospace">ON public.orders</text>
      <text x="28" y="256" fill="#f8f4e9" font-size="20" font-family="Consolas, monospace">(tenant_id, created_at);</text>

      <rect x="28" y="316" width="437" height="78" rx="13" fill="#102842" stroke="#294966"/>
      <text x="50" y="347" fill="#9fb1c6" font-size="15">Input evidence</text>
      <text x="50" y="374" fill="#f8f4e9" font-size="17" font-weight="650">Sanitized workload snapshot • 18,240 calls</text>
    </g>

    <path d="M579 366H625" stroke="#b9f33a" stroke-width="5" stroke-linecap="round"/>
    <path d="M617 354L632 366L617 378" fill="none" stroke="#b9f33a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(650 154)" filter="url(#shadow)">
      <rect width="554" height="430" rx="22" fill="#f8f4e9"/>
      <text x="34" y="48" fill="#0a1a30" font-size="17" font-weight="700">INDEXPILOT MIGRATION REVIEW</text>
      <text x="34" y="83" fill="#5d6b7b" font-size="15">Advisory only • statement 1 • public.orders</text>
      <path d="M34 107H520" stroke="#d7d4ca"/>

      <rect x="34" y="135" width="486" height="82" rx="15" fill="#e8f7bb" stroke="#a2d923" stroke-width="2"/>
      <circle cx="74" cy="176" r="22" fill="#b9f33a"/>
      <path d="M64 176L72 184L86 166" fill="none" stroke="#0a1a30" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="111" y="169" fill="#0a1a30" font-size="15" font-weight="700">VERDICT</text>
      <text x="111" y="195" fill="#0a1a30" font-size="24" font-family="Consolas, monospace" font-weight="700">existing_overlap</text>

      <text x="34" y="264" fill="#0a1a30" font-size="17" font-weight="700">Why</text>
      <text x="34" y="294" fill="#334155" font-size="17">A comparable valid B-tree already has this</text>
      <text x="34" y="320" fill="#334155" font-size="17">leading-column prefix.</text>

      <g transform="translate(34 352)">
        <rect width="151" height="45" rx="11" fill="#0d223c"/>
        <text x="75.5" y="29" text-anchor="middle" fill="#f8f4e9" font-size="15" font-weight="650">JSON evidence</text>
        <rect x="166" width="151" height="45" rx="11" fill="#0d223c"/>
        <text x="241.5" y="29" text-anchor="middle" fill="#f8f4e9" font-size="15" font-weight="650">Markdown review</text>
        <rect x="332" width="154" height="45" rx="11" fill="#0d223c"/>
        <text x="409" y="29" text-anchor="middle" fill="#f8f4e9" font-size="15" font-weight="650">Optional SARIF</text>
      </g>
    </g>

    <g transform="translate(66 653)">
      <rect width="1138" height="58" rx="18" fill="#0a1a30" stroke="#2d4a67"/>
      <circle cx="31" cy="29" r="10" fill="#b9f33a"/>
      <path d="M26 29L30 33L37 24" fill="none" stroke="#0a1a30" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="53" y="36" fill="#f8f4e9" font-size="18" font-weight="650">No index created</text>
      <text x="237" y="36" fill="#59718c" font-size="22">•</text>
      <text x="265" y="36" fill="#f8f4e9" font-size="18" font-weight="650">No database secret required for this sample</text>
      <text x="700" y="36" fill="#59718c" font-size="22">•</text>
      <text x="728" y="36" fill="#f8f4e9" font-size="18" font-weight="650">No latency claim</text>
      <g transform="translate(1030 15)">
        <path d="M0 0H8V8H0ZM0 20H8V28H0ZM20 0H28V8H20ZM20 20H28V28H20Z" fill="#f8f4e9"/>
        <rect x="9" y="9" width="10" height="10" fill="#b9f33a"/>
        <text x="40" y="21" fill="#9fb1c6" font-size="13" font-weight="700">READ ONLY</text>
      </g>
    </g>
  </g>
</svg>
