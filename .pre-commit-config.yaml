# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# Note: ruff and mypy are NOT included here because they check ALL Python files.
# Use `make lint`, `make typecheck`, or `make check` to run linting/type checking on src/ only.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: agent-skill-and-check-router
        name: Route agent skills and staged checks
        entry: python scripts/agent_skill_router.py --staged
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        description: "Names relevant agent skills and runs non-modifying path-aware checks"

      - id: check-unsafe-db-access
        name: Check for unsafe database result access
        entry: python scripts/check_unsafe_db_access.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        description: "Enforces use of safe_get_row_value() instead of direct tuple index access"
